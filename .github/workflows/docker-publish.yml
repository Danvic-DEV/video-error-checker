name: Docker Publish

on:
  push:
    branches: ["main"]
    tags: ["v*.*.*"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve image name
        id: vars
        shell: bash
        run: |
          OWNER_LC="${GITHUB_REPOSITORY_OWNER,,}"
          echo "image=ghcr.io/${OWNER_LC}/video-error-checker" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.vars.outputs.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image (attempt 1)
        id: build_push_attempt_1
        continue-on-error: true
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Build and push Docker image (attempt 2)
        id: build_push_attempt_2
        if: steps.build_push_attempt_1.outcome == 'failure'
        continue-on-error: true
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Build attempt summary
        if: always()
        run: |
          echo "Image: ${{ steps.vars.outputs.image }}"
          echo "Attempt 1 outcome: ${{ steps.build_push_attempt_1.outcome || 'not-run' }}"
          echo "Attempt 2 outcome: ${{ steps.build_push_attempt_2.outcome || 'not-run' }}"

      - name: Fail if all build attempts failed
        if: steps.build_push_attempt_1.outcome == 'failure' && steps.build_push_attempt_2.outcome == 'failure'
        run: |
          echo "Docker build/push failed after retry for image: ${{ steps.vars.outputs.image }}"
          echo "Check the logs for both build-push steps above for the concrete registry/build error."
          exit 1
